name: Send Newsletter
on:
  push:
    branches: [master]
    paths:
      - "content/newsletters/**"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      added: ${{ steps.f.outputs.added_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: f
        run: |
          ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- content/newsletters/*.md | sed 's|content/newsletters/||;s|\.md$||' | head -1)
          echo "added_files=$ADDED" >> "$GITHUB_OUTPUT"

  send:
    needs: detect
    if: needs.detect.outputs.added != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run newsletter:send
        env:
          ENVIRONMENT: production
          ISSUE_SLUG: ${{ needs.detect.outputs.added }}
          SITE_URL: ${{ secrets.SITE_URL }}
          NEWSLETTER_SEND_SECRET: ${{ secrets.NEWSLETTER_SEND_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
