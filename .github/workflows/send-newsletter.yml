name: Send Newsletter
on:
  push:
    branches: [master]
    paths:
      - "content/posts/**"
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run newsletter:send
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          NEWSLETTER_SEND_SECRET: ${{ secrets.NEWSLETTER_SEND_SECRET }}
