name: Send Newsletter
on:
  workflow_dispatch:
    inputs:
      issue_slug:
        description: "Newsletter issue slug (filename under content/newsletters/ without .md)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run newsletter:send
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          ISSUE_SLUG: ${{ inputs.issue_slug }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ inputs.environment == 'production' && secrets.D1_DATABASE_ID || secrets.STAGE_D1_DATABASE_ID }}
