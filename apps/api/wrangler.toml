name = "api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Uncomment to go live:
# routes = [
#   { pattern = "blog.hmziq.rs/api/newsletter/*", zone_name = "hmziq.rs" }
# ]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "blog-db"
database_id = "00000000-0000-0000-0000-000000000000" # TODO: replace with real D1 database ID

[[send_email]]
name = "SEND_EMAIL"

[env.dev]
vars = { ENVIRONMENT = "development" }

[[env.dev.d1_databases]]
binding = "DB"
database_name = "blog-db-dev"
database_id = "00000000-0000-0000-0000-000000000001" # TODO: replace with real D1 dev database ID

[[env.dev.send_email]]
name = "SEND_EMAIL"
