name = "api"
main = "src/index.ts"
compatibility_date = "2025-10-11"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[dev]
port = 8788
ip = "localhost"

# Prod routes
routes = [
  { pattern = "blog.hmziq.rs/api/newsletter/*", zone_name = "hmziq.rs" }
]

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://blog.hmziq.rs"
SITE_URL = "https://blog.hmziq.rs"

[[d1_databases]]
binding = "DB"
database_name = "blog-db"
database_id = "00000000-0000-0000-0000-000000000000" # Replace with real D1 production ID before first deploy

[[send_email]]
name = "SEND_EMAIL"

[[queues.producers]]
binding = "NEWSLETTER_QUEUE"
queue = "newsletter-send"

[[queues.consumers]]
queue = "newsletter-send"
max_batch_size = 10
max_batch_timeout = 30
dead_letter_queue = "newsletter-dlq"

[[queues.producers]]
binding = "NEWSLETTER_DLQ"
queue = "newsletter-dlq"

# ─── Staging ────────────────────────────────────────────
[env.staging]
name = "api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGIN = "https://staging.hmziqblog.pages.dev"
SITE_URL = "https://staging.hmziqblog.pages.dev"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "blog-db-staging"
database_id = "00000000-0000-0000-0000-000000000001" # Replace with real D1 staging ID before first deploy

[[env.staging.send_email]]
name = "SEND_EMAIL"

[[env.staging.queues.producers]]
binding = "NEWSLETTER_QUEUE"
queue = "newsletter-send-staging"

[[env.staging.queues.consumers]]
queue = "newsletter-send-staging"
max_batch_size = 10
max_batch_timeout = 30
dead_letter_queue = "newsletter-dlq-staging"

[[env.staging.queues.producers]]
binding = "NEWSLETTER_DLQ"
queue = "newsletter-dlq-staging"
