name = "api"
main = "src/index.ts"
compatibility_date = "2025-10-11"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8788
ip = "localhost"

# Prod routes — uncomment to go live
# routes = [
#   { pattern = "blog.hmziq.rs/api/newsletter/*", zone_name = "hmziq.rs" }
# ]

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "" # prod is same-origin; CORS off
SITE_URL = "https://blog.hmziq.rs"

[[d1_databases]]
binding = "DB"
database_name = "blog-db"
database_id = "00000000-0000-0000-0000-000000000000" # Replace with real D1 production ID before first deploy

[[send_email]]
name = "SEND_EMAIL"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "<KV-namespace-id>" # Replace with real KV namespace ID before first deploy

[[queues.producers]]
binding = "NEWSLETTER_QUEUE"
queue = "newsletter-send"

[[queues.consumers]]
queue = "newsletter-send"
max_batch_size = 10
max_batch_timeout = 30

# ─── Staging ────────────────────────────────────────────
[env.staging]
name = "api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGIN = "https://web-staging.pages.dev" # update after first Pages deploy
SITE_URL = "https://web-staging.pages.dev" # update after first Pages deploy

[[env.staging.d1_databases]]
binding = "DB"
database_name = "blog-db-staging"
database_id = "00000000-0000-0000-0000-000000000001" # Replace with real D1 staging ID before first deploy

[[env.staging.send_email]]
name = "SEND_EMAIL"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "<staging-KV-namespace-id>" # Replace with real KV staging namespace ID before first deploy

[[env.staging.queues.producers]]
binding = "NEWSLETTER_QUEUE"
queue = "newsletter-send-staging"

[[env.staging.queues.consumers]]
queue = "newsletter-send-staging"
max_batch_size = 10
max_batch_timeout = 30
