name = "web"
main = "./src/entry-worker.ts"
compatibility_date = "2024-01-01"

# Production environment
[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "blog-newsletter"
database_id = ""  # Add your production database ID here

# Development environment
[env.dev]
vars = { ENVIRONMENT = "development" }

[[env.dev.d1_databases]]
binding = "DB"
database_name = "blog-newsletter-dev"
database_id = ""  # Add your development database ID here
