name = "web"
compatibility_date = "2025-04-01"

# Production environment
[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "blog-newsletter"
database_id = "00000000-0000-0000-0000-000000000000" # TODO: replace with real D1 database ID from Cloudflare dashboard

# Development environment
[env.dev]
vars = { ENVIRONMENT = "development" }

[[env.dev.d1_databases]]
binding = "DB"
database_name = "blog-newsletter-dev"
database_id = "00000000-0000-0000-0000-000000000001" # TODO: replace with real D1 dev database ID from Cloudflare dashboard
